# Criticality Override Registry (Task 2.4)
#
# Nodes listed here with `protected: true` are NEVER pruned by the MVS pruner
# (Phase 3), regardless of how rarely they appear in the telemetry corpus. This
# is the deliberate escape hatch from pure usage-driven pruning, for features
# that are load-bearing for security, safety, or accessibility even when rare.
#
# Every entry MUST carry a non-empty `justification` and an `owner` (enforced by
# schemas/overrides.schema.json). See docs/overrides.md for the process and the
# bar an override has to clear. Node ids are the stable ids from the Phase-1 AST
# artifacts under artifacts/.

# Starter registry for rfc3986-uri. Free crawl corpora are overwhelmingly
# fetched http/https *page* URLs, so several grammar features that are load-
# bearing for security or interoperability appear well under the 0.1% pruning
# threshold — corpus bias, not evidence they are unused. The diversity strata
# (WAT outlinks, Wikipedia externallinks) raise their frequency, but the ones
# below must survive pruning regardless of how the sample lands. Each protects a
# Phase-1 rule node id from artifacts/rfc3986-uri.ast.json.
schema_version: 1
overrides:
  # Scheme charset boundary (defined against the 9.3M-URI corpus). RFC 3986 allows
  # scheme = ALPHA *( ALPHA / DIGIT / "+" / "-" / "." ). Of the trailing chars,
  # only DIGIT (e.g. s3:, u2f:) and "-" (e.g. ms-word:, view-source:) actually
  # appeared; "+" (0 obs) and "." (2 obs in 9.3M) did not and are intentionally
  # left out — this is the MVS drawing a tighter, evidence-backed boundary than the
  # RFC. DIGIT and "-" are kept as protected (both fall just under the 0.1%
  # threshold) because they are structurally standard scheme characters in real use.
  "rfc3986-uri:scheme#2093cace":  # DIGIT in the scheme trailing charset
    protected: true
    justification: >-
      Scheme boundary: digits are structurally standard in real schemes (s3, u2f,
      web3) and appear in the corpus, but below the 0.1% threshold. Kept so the MVS
      scheme charset is ALPHA / DIGIT / "-", tighter than RFC 3986 yet not
      surprising ("reject s3:" would be wrong); "+" and "." are deliberately excluded.
    owner: protocol-wg
  "rfc3986-uri:scheme#856d14d5":  # "-" in the scheme trailing charset
    protected: true
    justification: >-
      Scheme boundary: the hyphen is standard in real schemes (ms-word,
      view-source, microsoft-edge) and is the most-observed trailing scheme char in
      the corpus, yet below threshold. Kept so hyphenated schemes remain valid; the
      RFC's "+" and "." are excluded as unobserved in 9.3M URIs.
    owner: protocol-wg

  # Percent-encoding is rare across sampled URIs but must never be dropped:
  # correct decoding is what lets a parser normalize and reject encoded
  # path-traversal (%2e%2e) and injection payloads. Removing it would turn a
  # security control into a silent bypass.
  "rfc3986-uri:pct-encoded#5b00e532":
    protected: true
    justification: >-
      Security-critical: percent-encoding must be parsed to correctly normalize
      and reject encoded traversal (%2e%2e) and injection payloads, even though
      it appears in well under 0.1% of sampled URIs.
    owner: security-wg

  # userinfo is the classic authority-confusion vector (https://good.com@evil.com).
  # A parser that cannot recognize userinfo cannot enforce the defense — it would
  # read evil.com as the host without ever knowing the good.com@ prefix was there.
  # Rare and deprecated for transport, but its recognition is a security control.
  "rfc3986-uri:userinfo#2bf7da71":
    protected: true
    justification: >-
      Security-critical: the userinfo component must be parsed to defend against
      authority-confusion / phishing URLs like https://trusted.com@attacker.com.
      Dropping it would let a parser silently treat the attacker host as trusted.
    owner: security-wg

  # Non-default ports are the norm for internal services, dev/staging, and
  # alt-svc endpoints, none of which the public page-URL corpus samples well.
  # Dropping port would reject valid authorities and break origin comparison
  # (scheme+host+port), a security-relevant identity.
  "rfc3986-uri:port#cdb4d14b":
    protected: true
    justification: >-
      Interop- and security-critical: the port subcomponent is load-bearing for
      internal/non-standard-port services and for same-origin comparison
      (scheme+host+port), even though public page URLs almost always omit it.
    owner: protocol-wg

  # IP-literal (and its IPv6/IPvFuture children) addresses hosts directly rather
  # than by name. Rare in crawled page URLs but essential for link-local, loopback,
  # and internal addressing — and a parser must recognize IPv6 literals to apply
  # SSRF / private-range defenses (e.g. [::1], [fd00::]).
  "rfc3986-uri:IP-literal#615ca5b3":
    protected: true
    justification: >-
      Security-critical: IP-literal authorities ([...]) must be parsed so SSRF and
      private-range defenses can inspect literal IPv6 hosts (e.g. [::1], [fd00::]).
      They are rare in page-URL corpora but load-bearing wherever hosts are
      addressed directly.
    owner: security-wg
  "rfc3986-uri:IPv6address#1225d44b":
    protected: true
    justification: >-
      Security-critical: the IPv6 address form inside an IP-literal must be parsed
      to correctly identify loopback/link-local/unique-local hosts for SSRF and
      access-control decisions, despite near-zero frequency in crawled page URLs.
    owner: security-wg
  # IPv4 literal hosts (http://127.0.0.1/, http://169.254.169.254/) are the most
  # common SSRF vector, yet appear in well under 0.1% of crawled page URLs. Protect
  # so the full dec-octet machinery (0-255) survives and `host` keeps its IPv4
  # branch; a narrowed dec-octet would silently accept only some octet ranges.
  "rfc3986-uri:IPv4address#d1e871a6":
    protected: true
    justification: >-
      Security-critical: IPv4 literal authorities are the primary SSRF target
      (127.0.0.1, 169.254.169.254, 10.x). Protect so the address and its
      dec-octet range (0-255) survive pruning even at near-zero corpus frequency.
    owner: security-wg
  # NOTE: IPvFuture is intentionally not listed. Protecting IP-literal pulls it back
  # transitively (IP-literal = "[" ( IPv6address / IPvFuture ) "]"), so it renders
  # via the reference-reachability closure without an explicit, hard-to-justify
  # override of a form that has no defined address version yet.

  # Fragments are never sent to the server, so server-side crawl corpora
  # systematically under-count them, yet they carry client-side routing (SPA
  # state), media fragments, and accessibility skip-links (#main). They are part
  # of the URI identity and must not be pruned as "unused".
  "rfc3986-uri:fragment#ae36814a":
    protected: true
    justification: >-
      Interop- and accessibility-critical: fragments carry client-side routing,
      media fragments, and skip-to-content anchors (#main). Server-log and crawl
      corpora under-count them because fragments are not sent to the server, so
      their low sampled frequency is an artifact, not evidence of disuse.
    owner: protocol-wg
