name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  rust:
    name: Rust lint & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: core
      - name: rustfmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --all-targets --all-features
      - name: test
        run: cargo test --all

  python:
    name: Python lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dev deps
        run: python -m pip install --upgrade pip ".[dev]"
      - name: ruff check
        run: ruff check .
      - name: ruff format --check
        run: ruff format --check .
      - name: pytest
        run: python -m pytest

  e2e:
    name: Collector end-to-end (real binary)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: core
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build mvs-telemetry
        run: cargo build -p mvs-cli --manifest-path core/Cargo.toml
      - name: Install dev deps
        run: python -m pip install --upgrade pip ".[dev]"
      - name: Run the collector end-to-end over committed fixtures
        env:
          MVS_TELEMETRY_BIN: ${{ github.workspace }}/core/target/debug/mvs-telemetry
        run: python -m pytest pipeline/tests/test_collector_orchestrate.py -v

  cross-build:
    name: Native build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: core
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            linker: gcc-aarch64-linux-gnu
          # macOS
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          # Windows
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: windows-latest
            target: aarch64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: core
          key: ${{ matrix.target }}
      - name: Install cross linker (aarch64 Linux)
        if: matrix.linker != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.linker }}
          mkdir -p .cargo
          {
            echo '[target.aarch64-unknown-linux-gnu]'
            echo 'linker = "aarch64-linux-gnu-gcc"'
          } >> .cargo/config.toml
      - name: Build release
        run: cargo build --release --workspace --target ${{ matrix.target }}
